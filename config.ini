# ServMon Configuration
# API endpoint para recibir métricas (dejar vacío para solo local)
API_ENDPOINT="http://192.168.0.113:3000/api/metrics"

# API Key para autenticación
API_KEY="tu-api-key-aqui"

# Intervalo de recolección en segundos (default: 60)
INTERVAL=60

# Umbral para archivos pesados en MB
HEAVY_FILE_THRESHOLD=100

# Habilitar/deshabilitar módulos
COLLECT_CPU=true
COLLECT_MEMORY=true
COLLECT_DISK=true
COLLECT_NETWORK=true
COLLECT_PORTS=true
COLLECT_PROCESSES=true
